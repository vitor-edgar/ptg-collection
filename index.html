<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTG Balance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>PTG Balance</h1>
            <nav class="tabs">
                <button class="tab-btn active" data-target="tracker-view">Saldo</button>
                <button class="tab-btn" data-target="history-view">Histórico</button>
            </nav>
        </header>

        <main>
            <!-- Tracker View -->
            <div id="tracker-view" class="view">
                <div id="balance-container">
                    <span class="label">Saldo Atual</span>
                    <div id="balance">R$ 0,00</div>
                </div>

                <section class="action-section">
                    <h2>Ganhos (Créditos)</h2>
                    <div class="input-group">
                        <input type="number" id="credit-input" placeholder="Valor manual" step="0.01">
                        <button id="add-credit-btn" class="btn-main credit">Adicionar</button>
                    </div>
                    
                    <div class="grid shortcuts">
                        <button class="shortcut credit" data-value="2"><span>Tarefa Muito Simples</span><strong>+ R$ 2</strong></button>
                        <button class="shortcut credit" data-value="5"><span>Tarefa Simples</span><strong>+ R$ 5</strong></button>
                        <button class="shortcut credit" data-value="15"><span>Tarefa Importante</span><strong>+ R$ 15</strong></button>
                        <button class="shortcut credit" data-value="20"><span>Hábito Prioritário</span><strong>+ R$ 20</strong></button>
                        <button class="shortcut credit" data-value="50"><span>Grandes Conquistas</span><strong>+ R$ 50</strong></button>
                    </div>
                </section>

                <hr>

                <section class="action-section">
                    <h2>Gastos (Despesas)</h2>
                    <div class="input-group">
                        <input type="number" id="debit-input" placeholder="Valor manual" step="0.01">
                        <button id="add-debit-btn" class="btn-main debit">Deduzir</button>
                    </div>
                    <div class="grid shortcuts debit-grid">
                        <button class="shortcut debit" data-value="2"><span>Carta</span><strong>- R$ 2</strong><small>1 carta</small></button>
                        <button class="shortcut debit" data-value="25"><span>Play Booster</span><strong>- R$ 25</strong><small>14 cartas</small></button>
                        <button class="shortcut debit" data-value="225"><span>Bundle</span><strong>- R$ 225</strong><small>126 cartas</small></button>
                        <button class="shortcut debit" data-value="250"><span>Precon</span><strong>- R$ 250</strong><small>100 cartas</small></button>
                        <button class="shortcut debit" data-value="900"><span>Booster Box</span><strong>- R$ 900</strong><small>504 cartas</small></button>
                    </div>
                </section>
            </div>

            <!-- History View -->
            <div id="history-view" class="view hidden">
                <div class="history-content">
                    <h2>Histórico</h2>
                    <div id="history-list">
                        <!-- Transações serão inseridas aqui -->
                        <p class="empty-msg">Nenhuma transação registrada.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Activity Name Modal -->
        <div id="activity-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Nome da Atividade</h3>
                <input type="text" id="activity-name-input" placeholder="Ex: Café, Malhar, Task...">
                <div class="modal-actions">
                    <button id="cancel-activity-btn" class="btn-secondary">Cancelar</button>
                    <button id="confirm-activity-btn" class="btn-main credit">Confirmar</button>
                </div>
            </div>
        </div>

        <div id="notification" class="hidden">Saldo Negativo!</div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
