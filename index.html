<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTG Balance Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>PTG Balance</h1>
            <nav class="tabs">
                <button class="tab-btn active" data-target="tracker-view">Saldo</button>
                <button class="tab-btn" data-target="rules-view">Regulamento</button>
            </nav>
        </header>

        <main>
            <!-- Tracker View -->
            <div id="tracker-view" class="view">
                <div id="balance-container">
                    <span class="label">Saldo Atual</span>
                    <div id="balance">R$ 0,00</div>
                </div>

                <section class="action-section">
                    <h2>Ganhos (Créditos)</h2>
                    <div class="input-group">
                        <select id="activity-select">
                            <option value="" disabled selected>Selecionar Atividade...</option>
                            <optgroup label="Comum (R$ 5)">
                                <option value="5">☕ Café saudável</option>
                                <option value="5">🗑️ Levar o lixo</option>
                                <option value="5">⚡ Pequena tarefa rápida</option>
                            </optgroup>
                            <optgroup label="Incomum (R$ 15)">
                                <option value="15">✅ Completar task</option>
                                <option value="15">💪 Malhar</option>
                                <option value="15">📅 Obrigação importante</option>
                            </optgroup>
                            <optgroup label="Raro (R$ 20)">
                                <option value="20">🏋️ Malhar (FDS)</option>
                                <option value="20">🐕 Passeio cachorro (1h)</option>
                            </optgroup>
                            <optgroup label="Mítico (R$ 50)">
                                <option value="50">🚀 Finalizar projeto</option>
                                <option value="50">🏠 Organizar a casa</option>
                                <option value="50">📚 Estudar (horas)</option>
                            </optgroup>
                        </select>
                        <button id="add-activity-btn" class="btn-main credit">Lançar</button>
                    </div>
                    
                    <div class="input-group">
                        <input type="number" id="credit-input" placeholder="Valor manual" step="0.01">
                        <button id="add-credit-btn" class="btn-main credit">Adicionar</button>
                    </div>
                    
                    <div class="grid shortcuts credit-grid">
                        <button class="shortcut credit" data-value="5"><span>Comum</span><strong>+ R$ 5</strong></button>
                        <button class="shortcut credit" data-value="15"><span>Incomum</span><strong>+ R$ 15</strong></button>
                        <button class="shortcut credit" data-value="20"><span>Raro</span><strong>+ R$ 20</strong></button>
                        <button class="shortcut credit" data-value="50"><span>Mítico</span><strong>+ R$ 50</strong></button>
                    </div>
                </section>

                <hr>

                <section class="action-section">
                    <h2>Gastos (Despesas)</h2>
                    <div class="input-group">
                        <input type="number" id="debit-input" placeholder="Valor manual" step="0.01">
                        <button id="add-debit-btn" class="btn-main debit">Deduzir</button>
                    </div>
                    <div class="grid shortcuts debit-grid">
                        <button class="shortcut debit" data-value="2"><span>Carta</span><strong>- R$ 2</strong></button>
                        <button class="shortcut debit" data-value="25"><span>Play Booster</span><strong>- R$ 25</strong></button>
                        <button class="shortcut debit" data-value="225"><span>Bundle</span><strong>- R$ 225</strong></button>
                        <button class="shortcut debit" data-value="250"><span>Precon</span><strong>- R$ 250</strong></button>
                        <button class="shortcut debit" data-value="900"><span>Booster Box</span><strong>- R$ 900</strong></button>
                    </div>
                </section>
            </div>

            <!-- Rules View -->
            <div id="rules-view" class="view hidden">
                <div class="rules-content">
                    <h2>Regulamento: PTG Collection</h2>
                    <div id="rules-text">Carregando...</div>
                </div>
            </div>
        </main>

        <div id="notification" class="hidden">Saldo Negativo!</div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
